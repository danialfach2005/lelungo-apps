name: Production Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Linter
        run: npm run lint

      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"

      # Optional: Lighthouse CI
      # This runs a basic Lighthouse audit on the statically built Next.js app
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          staticDistDir: './.next/server/app' # Approximation for static pages, or serve the app
          configPath: '' # Optional: define a lighthouserc.json for fine-grained thresholds
          temporaryPublicStorage: true
          uploadArtifacts: true
        continue-on-error: true # Set to false to strictly block merge if Lighthouse fails
